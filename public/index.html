<!DOCTYPE html>
<html lang="en" data-theme="netflix">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#141414">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>BingeBox Omega - Next-Gen Cinematic Engine</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono:['Consolas', 'monospace'] },
                    colors: {
                        theme: { primary: 'var(--color-primary)', hover: 'var(--color-hover)', bg: 'var(--color-bg)', surface: 'var(--color-surface)', border: 'var(--color-border)' }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.3s ease-out forwards',
                        'pulse-glow': 'pulseGlow 3s ease-in-out infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        scaleIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
                        pulseGlow: { '0%, 100%': { opacity: '0.3', transform: 'scale(1)' }, '50%': { opacity: '0.6', transform: 'scale(1.05)' } },
                        shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } }
                    }
                }
            }
        }
    </script>

    <style>
        :root[data-theme="netflix"] { --color-primary: #E50914; --color-hover: #f40612; --color-bg: #141414; --color-surface: rgba(20, 20, 20, 0.8); --color-border: rgba(255, 255, 255, 0.1); }
        :root[data-theme="hulu"] { --color-primary: #1ce783; --color-hover: #22c55e; --color-bg: #0b0c0f; --color-surface: rgba(11, 12, 15, 0.8); --color-border: rgba(28, 231, 131, 0.2); }
        :root[data-theme="max"] { --color-primary: #5c00e6; --color-hover: #7b2cbf; --color-bg: #030014; --color-surface: rgba(15, 5, 30, 0.8); --color-border: rgba(92, 0, 230, 0.3); }
        :root[data-theme="prime"] { --color-primary: #00A8E1; --color-hover: #3b82f6; --color-bg: #000000; --color-surface: rgba(15, 25, 35, 0.8); --color-border: rgba(0, 168, 225, 0.2); }
        
        body { background-color: var(--color-bg); color: #ffffff; overflow-x: hidden; -webkit-font-smoothing: antialiased; transition: background-color 0.5s ease; user-select: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .glass { background: var(--color-surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--color-border); }
        .glass-panel { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(30px); border: 1px solid var(--color-border); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); }

        .skeleton { position: relative; overflow: hidden; background-color: #222; border-radius: 0.5rem; }
        .skeleton::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); background-image: linear-gradient(90deg, transparent 0, rgba(255, 255, 255, 0.08) 20%, rgba(255, 255, 255, 0.15) 60%, transparent); animation: shimmer 2s infinite; }

        img.lazy { opacity: 0; transition: opacity 0.6s ease-in-out; }
        img.lazy.loaded { opacity: 1; }
        .tilt-card { transition: transform 0.1s ease-out, box-shadow 0.1s ease-out; transform-style: preserve-3d; perspective: 1000px; }

        #context-menu { display: none; position: fixed; z-index: 99999999; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="app"></div>
    <div id="toast-container" class="fixed top-24 left-1/2 -translate-x-1/2 z-[9999999] flex flex-col gap-3 pointer-events-none"></div>
    <div id="modal-container"></div>
    <div id="player-container"></div>

    <div id="context-menu" class="glass-panel w-56 rounded-xl overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.9)] animate-scale-in origin-top-left border border-theme-border">
        <div class="px-4 py-2 text-xs font-bold text-gray-500 uppercase tracking-widest border-b border-theme-border bg-white/5">Quick Actions</div>
        <button id="cm-play" class="w-full text-left px-4 py-3 hover:bg-theme-primary hover:text-white transition-colors flex items-center gap-3 text-sm font-medium"><i data-lucide="play" class="w-4 h-4"></i> Instant Play</button>
        <button id="cm-watchlist" class="w-full text-left px-4 py-3 hover:bg-white/10 transition-colors flex items-center gap-3 text-sm font-medium"><i data-lucide="bookmark" class="w-4 h-4"></i> Toggle Watchlist</button>
        <button id="cm-share" class="w-full text-left px-4 py-3 hover:bg-white/10 transition-colors flex items-center gap-3 text-sm font-medium"><i data-lucide="share-2" class="w-4 h-4"></i> Copy Link</button>
    </div>

    <script>
        /**
         * 1. X-FRAME-TITAN V10 - ROUTED THROUGH INTERNAL BACKEND PROXY
         */
        (function (root, factory) {
            if (typeof define === 'function' && define.amd) { define([], factory); } 
            else if (typeof module === 'object' && module.exports) { module.exports = factory(); } 
            else { root.XFrameTitan = factory(); }
        }(typeof self !== 'undefined' ? self : this, function () {
            'use strict';
            class XFrameTitanElement extends HTMLIFrameElement {
                constructor() { super(); }
                connectedCallback() {
                    // Maximum permissive sandbox but strictly routing through our custom Node.js proxy to defeat iframe blocks & ad scripts.
                    this.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-presentation');
                    this.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture; display-capture;');
                    this.setAttribute('referrerpolicy', 'no-referrer');
                    if (this.getAttribute('src')) this.navigate(this.getAttribute('src'));
                }
                async navigate(url) {
                    // Passes the streaming link to our custom backend, bypassing CORS and injecting AdBlocker perfectly
                    const origin = window.location.origin;
                    this.src = `${origin}/api/proxy?url=${encodeURIComponent(url)}`;
                }
            }
            if (typeof window !== 'undefined' && window.customElements && !customElements.get('x-frame-bypass')) {
                customElements.define('x-frame-bypass', XFrameTitanElement, { extends: 'iframe' });
            }
            return XFrameTitanElement;
        }));

        /**
         * 2. STATE & TMDB CONFIG
         */
        const SafeStorage = {
            get(key, fallback) { try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; } },
            set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} },
        };

        const CONFIG = { TMDB_KEY: '15d2ea6d0dc1d476efbca3eba2b9bbfb', TMDB_BASE: 'https://api.themoviedb.org/3', IMG_BASE: 'https://image.tmdb.org/t/p' };

        const AppState = {
            view: 'home', contentMode: 'all', cache: new Map(),
            profiles: SafeStorage.get('bb_profiles',[{ id: 'p1', name: 'Admin', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Admin' }]),
            currentProfile: null,
            settings: SafeStorage.get('bb_settings', { theme: 'netflix', defaultServer: 'vidlink', ambientGlow: true, cinemaDim: true, showFPS: false, bandwidthSaver: false }),
            library: SafeStorage.get('bb_lib', { history: [], liked:[], watchlater:[] }),
            stats: SafeStorage.get('bb_stats', { hoursWatched: 0, movies: 0, episodes: 0 }),
            servers:[
                { id: 'vidlink', name: 'VidLink Pro (Fastest)', type: 'multi', getUrl: (t, id, s, e) => t === 'movie' ? `https://vidlink.pro/movie/${id}?primaryColor=E50914&autoplay=true` : `https://vidlink.pro/tv/${id}/${s}/${e}?primaryColor=E50914&autoplay=true` },
                { id: 'vidsrcpro', name: 'VidSrc PRO', type: 'multi', getUrl: (t, id, s, e) => t === 'movie' ? `https://vidsrc.pro/embed/movie/${id}` : `https://vidsrc.pro/embed/tv/${id}/${s}/${e}` },
                { id: 'superembed', name: 'SuperEmbed HD', type: 'multi', getUrl: (t, id, s, e) => t === 'movie' ? `https://multiembed.mov/directstream.php?video_id=${id}` : `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1&s=${s}&e=${e}` }
            ]
        };

        const TMDB = {
            async fetch(path, params = {}) {
                const query = new URLSearchParams({ api_key: CONFIG.TMDB_KEY, ...params }).toString();
                const url = `${CONFIG.TMDB_BASE}${path}?${query}`;
                if (AppState.cache.has(url)) return AppState.cache.get(url);
                try { const res = await fetch(url); const data = await res.json(); AppState.cache.set(url, data); return data; } catch (e) { return null; }
            },
            getImage(path, size = 'w500', type = 'poster') {
                if (path) return `${CONFIG.IMG_BASE}/${size}${path}`;
                return `https://via.placeholder.com/${type === 'poster' ? '500x750' : '1280x720'}/1a1a1a/ffffff?text=Image+Unavailable`;
            }
        };

        /**
         * 3. OMEGA PLAYER ENGINE - CUSTOM SCREEN/VIEWPORT FULLSCREEN
         */
        const Player = {
            isActive: false, isFullscreen: false, isPip: false,
            current: { type: null, id: null, s: null, e: null },
            resizeHandler: null,

            open(type, id, season = 1, episode = 1) {
                this.isActive = true; this.current = { type, id, s: season, e: episode };
                if (AppState.settings.cinemaDim) document.body.style.backgroundColor = '#000';
                document.body.style.overflow = 'hidden';

                const defaultSrv = AppState.settings.defaultServer;
                const container = document.getElementById('player-container');

                container.innerHTML = `
                    <div id="player-overlay" class="fixed inset-0 z-[99999] bg-black/95 backdrop-blur-3xl flex items-center justify-center animate-fade-in p-0 md:p-6 transition-all duration-300">
                        <div id="player-wrapper" class="relative w-full max-w-7xl aspect-video bg-black rounded-xl md:rounded-2xl shadow-[0_0_100px_rgba(0,0,0,1)] transition-all overflow-hidden group">
                            
                            ${AppState.settings.ambientGlow ? `<div class="absolute inset-0 z-[-1] animate-pulse-glow bg-theme-primary/30 blur-[100px] rounded-full scale-110"></div>` : ''}
                            
                            <!-- Powered by our internal Proxy backend -->
                            <iframe id="video-iframe" is="x-frame-bypass" class="w-full h-full border-0 absolute z-10 bg-black pointer-events-auto"></iframe>
                            
                            <div class="absolute top-0 left-0 right-0 p-4 md:p-6 z-20 bg-gradient-to-b from-black/90 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex justify-between items-start pointer-events-none">
                                <button onclick="Player.close()" class="glass px-4 md:px-6 py-2 md:py-3 rounded-full font-bold flex items-center gap-2 hover:bg-theme-primary transition-all text-sm shadow-xl pointer-events-auto">
                                    <i data-lucide="x" class="w-5 h-5"></i> <span class="hidden md:block">Close</span>
                                </button>
                                <div class="flex items-center gap-3 pointer-events-auto">
                                    <div class="flex items-center gap-2 bg-black/80 backdrop-blur-md border border-white/20 p-1.5 rounded-xl shadow-xl">
                                        <i data-lucide="server" class="w-4 h-4 text-theme-primary ml-2"></i>
                                        <select id="server-selector" onchange="Player.changeServer(this.value)" class="bg-transparent text-white font-bold outline-none cursor-pointer pr-2 text-sm appearance-none">
                                            ${AppState.servers.map(s => `<option value="${s.id}" ${s.id === defaultSrv ? 'selected' : ''}>${s.name}</option>`).join('')}
                                        </select>
                                    </div>
                                    <button onclick="Player.toggleCustomFullscreen()" class="glass p-3 rounded-xl hover:bg-white/20 transition-all hidden md:block" title="Maximize View"><i data-lucide="maximize" id="fs-icon" class="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                this.changeServer(defaultSrv);
            },

            changeServer(serverId) {
                const server = AppState.servers.find(s => s.id === serverId);
                UI.toast(`Routing to: ${server.name} via Omega Proxy`, 'info');
                const iframe = document.getElementById('video-iframe');
                const targetUrl = server.getUrl(this.current.type, this.current.id, this.current.s, this.current.e);
                iframe.navigate(targetUrl); 
            },

            // 10X CUSTOM FULLSCREEN LOGIC USING EXPLICIT SCREEN SIZE, RESOLUTION & VIEWPORT (No Native Browser APIs)
            toggleCustomFullscreen() {
                const wrapper = document.getElementById('player-wrapper');
                const overlay = document.getElementById('player-overlay');
                const icon = document.getElementById('fs-icon');

                if (this.isFullscreen) {
                    // Reset to normal styles
                    window.removeEventListener('resize', this.resizeHandler);
                    wrapper.style = '';
                    wrapper.className = 'relative w-full max-w-7xl aspect-video bg-black rounded-xl md:rounded-2xl shadow-[0_0_100px_rgba(0,0,0,1)] transition-all overflow-hidden group';
                    overlay.className = 'fixed inset-0 z-[99999] bg-black/95 backdrop-blur-3xl flex items-center justify-center p-0 md:p-6 transition-all duration-300';
                    icon.setAttribute('data-lucide', 'maximize');
                    document.body.style.overflow = 'hidden';
                } else {
                    // Activate 10x Viewport Override
                    wrapper.className = 'bg-black group'; // Strip relative constraints
                    overlay.className = 'fixed inset-0 z-[99999] bg-black p-0 m-0'; // Remove padding
                    
                    this.resizeHandler = () => {
                        // Dynamically map exact pixel size of the user's viewport ignoring DOM flow
                        wrapper.style.position = 'fixed';
                        wrapper.style.top = '0px';
                        wrapper.style.left = '0px';
                        wrapper.style.width = window.innerWidth + 'px';
                        wrapper.style.height = window.innerHeight + 'px';
                        wrapper.style.maxWidth = 'none';
                        wrapper.style.maxHeight = 'none';
                        wrapper.style.zIndex = '99999999';
                        wrapper.style.borderRadius = '0px';
                    };
                    
                    this.resizeHandler(); // Execute immediately
                    window.addEventListener('resize', this.resizeHandler); // Bind to active resolution changes
                    icon.setAttribute('data-lucide', 'minimize');
                    UI.toast("Screen Size Viewport Fullscreen Engaged", "success");
                }
                
                this.isFullscreen = !this.isFullscreen;
                lucide.createIcons();
            },

            close() {
                this.isActive = false;
                if(this.isFullscreen) this.toggleCustomFullscreen(); // Reset states
                document.body.style.overflow = '';
                document.body.style.backgroundColor = '';
                document.getElementById('player-container').innerHTML = '';
            }
        };

        /**
         * 4. CORE UI, ROUTER & LOGIC (Condensed for performance)
         */
        const UI = {
            init() { document.documentElement.setAttribute('data-theme', AppState.settings.theme); this.renderShell(); Router.navigate('home'); },
            toast(msg, type = 'info') {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                const colors = type === 'error' ? 'border-red-500 text-red-500' : (type === 'success' ? 'border-green-500 text-green-400' : 'border-theme-primary text-white');
                const icon = type === 'error' ? 'alert-triangle' : (type === 'success' ? 'check-circle' : 'info');
                t.className = `glass px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 animate-slide-up ${colors}`;
                t.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i><span class="font-bold text-sm tracking-wide">${msg}</span>`;
                container.appendChild(t); lucide.createIcons();
                setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3500);
            },
            renderShell() {
                document.getElementById('app').innerHTML = `
                    <header id="navbar" class="fixed top-0 w-full z-[100] transition-all duration-500 bg-gradient-to-b from-[var(--color-bg)] to-transparent h-20 px-4 md:px-8 flex items-center justify-between pointer-events-none">
                        <div class="flex items-center gap-6 md:gap-12 pointer-events-auto">
                            <h1 onclick="Router.navigate('home')" class="cursor-pointer text-2xl md:text-3xl font-black tracking-tighter hover:scale-105 transition-transform flex items-center gap-2 drop-shadow-[0_0_15px_rgba(var(--color-primary),0.8)]">Binge<span class="text-theme-primary">Box</span></h1>
                        </div>
                        <div class="flex items-center gap-3 md:gap-5 text-gray-300 pointer-events-auto">
                            <div onclick="document.documentElement.setAttribute('data-theme', 'godmode')" class="hover:text-yellow-500 transition-colors p-2 cursor-pointer"><i data-lucide="zap" class="w-5 h-5"></i></div>
                        </div>
                    </header>
                    <main id="main-view" class="min-h-screen pb-24"></main>
                `;
            }
        };

        const Router = {
            async navigate(view, params = {}) {
                const main = document.getElementById('main-view');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if (view === 'home') {
                    main.innerHTML = `<div class="pt-32 text-center text-4xl font-bold animate-pulse">Loading BingeBox Omega...</div>`;
                    const trending = await TMDB.fetch(`/trending/all/day`);
                    if(trending) {
                        main.innerHTML = `<div id="hero" class="w-full h-[80vh] relative mb-12">
                            <img src="${TMDB.getImage(trending.results[0].backdrop_path, 'original', 'backdrop')}" class="w-full h-full object-cover opacity-60" />
                            <div class="absolute inset-0 bg-gradient-to-t from-[var(--color-bg)] to-transparent"></div>
                            <div class="absolute bottom-20 left-12">
                                <h1 class="text-7xl font-black mb-4 drop-shadow-xl">${trending.results[0].title || trending.results[0].name}</h1>
                                <button onclick="Player.open('${trending.results[0].media_type}', ${trending.results[0].id})" class="bg-theme-primary text-white px-10 py-4 rounded-xl font-bold text-xl hover:scale-105 transition-all shadow-2xl flex items-center gap-2"><i data-lucide="play"></i> Stream via Omega Proxy</button>
                            </div>
                        </div>
                        <div class="px-12"><h2 class="text-3xl font-bold mb-6">Trending Now</h2><div class="flex gap-6 overflow-x-auto pb-10 scrollbar-hide">
                            ${trending.results.slice(1).map(item => `
                                <div onclick="Player.open('${item.media_type||'movie'}', ${item.id})" class="flex-shrink-0 w-48 cursor-pointer group tilt-card">
                                    <img src="${TMDB.getImage(item.poster_path, 'w500', 'poster')}" class="w-full rounded-xl shadow-xl group-hover:ring-2 ring-white transition-all" />
                                </div>
                            `).join('')}
                        </div></div>`;
                        lucide.createIcons();
                    }
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => UI.init());
    </script>
</body>
</html>
