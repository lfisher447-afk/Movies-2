      tailwind.config = {
         darkMode: "class",
         theme: {
            extend: {
               fontFamily: {
                  sans: ["Inter", "sans-serif"],
                  mono: ["Consolas", "monospace"],
               },
               colors: {
                  theme: {
                     primary: "var(--color-primary)",
                     hover: "var(--color-hover)",
                     bg: "var(--color-bg)",
                     surface: "var(--color-surface)",
                     border: "var(--color-border)",
                  },
               },
               animation: {
                  "fade-in": "fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                  "slide-up": "slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                  "scale-in": "scaleIn 0.3s ease-out forwards",
                  "pulse-glow": "pulseGlow 3s ease-in-out infinite",
                  shimmer: "shimmer 2s linear infinite",
               },
               keyframes: {
                  fadeIn: {
                     "0%": {
                        opacity: "0",
                     },
                     "100%": {
                        opacity: "1",
                     },
                  },
                  slideUp: {
                     "0%": {
                        opacity: "0",
                        transform: "translateY(30px)",
                     },
                     "100%": {
                        opacity: "1",
                        transform: "translateY(0)",
                     },
                  },
                  scaleIn: {
                     "0%": {
                        opacity: "0",
                        transform: "scale(0.95)",
                     },
                     "100%": {
                        opacity: "1",
                        transform: "scale(1)",
                     },
                  },
                  pulseGlow: {
                     "0%, 100%": {
                        opacity: "0.3",
                        transform: "scale(1)",
                     },
                     "50%": {
                        opacity: "0.6",
                        transform: "scale(1.05)",
                     },
                  },
                  shimmer: {
                     "0%": {
                        backgroundPosition: "-200% 0",
                     },
                     "100%": {
                        backgroundPosition: "200% 0",
                     },
                  },
               },
            },
         },
      };
   </script>
   <style>
      :root[data-theme="netflix"] {
         --color-primary: #e50914;
         --color-hover: #f40612;
         --color-bg: #141414;
         --color-surface: rgba(20, 20, 20, 0.8);
         --color-border: rgba(255, 255, 255, 0.1);

         --color-primary: #1ce783;
         --color-hover: #22c55e;
         --color-bg: #0b0c0f;
         --color-surface: rgba(11, 12, 15, 0.8);
         --color-border: rgba(28, 231, 131, 0.2);
      }

      :root[data-theme="max"] {
         --color-primary: #5c00e6;
         --color-hover: #7b2cbf;
         --color-bg: #030014;
         --color-surface: rgba(15, 5, 30, 0.8);
         --color-border: rgba(92, 0, 230, 0.3);
      }

         --color-primary: #00a8e1;
         --color-hover: #3b82f6;
         --color-bg: #000000;
         --color-surface: rgba(15, 25, 35, 0.8);
         --color-border: rgba(0, 168, 225, 0.2);
      }

      :root[data-theme="godmode"] {
         --color-primary: #ffd700;
         --color-hover: #ffa500;
         --color-bg: #1a1a1a;
         --color-surface: rgba(26, 26, 26, 0.9);
         --color-border: rgba(255, 215, 0, 0.4);
      }

      body {
         background-color: var(--color-bg);
         color: #ffffff;
         overflow-x: hidden;
         -webkit-font-smoothing: antialiased;
         transition: background-color 0.5s ease;
         user-select: none;
      }

      .scrollbar-hide::-webkit-scrollbar {
         display: none;
      }

      .scrollbar-hide {
         -ms-overflow-style: none;
         scrollbar-width: none;
      }

      .glass {
         background: var(--color-surface);
         backdrop-filter: blur(20px);
         -webkit-backdrop-filter: blur(20px);
         border: 1px solid var(--color-border);
      }

      .glass-panel {
         background: rgba(0, 0, 0, 0.85);
         backdrop-filter: blur(30px);
         border: 1px solid var(--color-border);
         box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
      }

      .skeleton {
         position: relative;
         overflow: hidden;
         background-color: #222;
         border-radius: 0.5rem;
      }

      .skeleton::after {
         content: "";
         position: absolute;
         inset: 0;
         transform: translateX(-100%);
         background-image: linear-gradient(90deg,
               transparent 0,
               rgba(255, 255, 255, 0.08) 20%,
               rgba(255, 255, 255, 0.15) 60%,
               transparent);
         animation: shimmer 2s infinite;
      }

      img.lazy {
         opacity: 0;
         transition: opacity 0.6s ease-in-out;
      }

      img.lazy.loaded {
         opacity: 1;
      }

      .tilt-card {
         transition:
            transform 0.1s ease-out,
            box-shadow 0.1s ease-out;
         transform-style: preserve-3d;
         perspective: 1000px;
      }

      /* Perfected Viewport Fullscreen CSS overrides */
      body.custom-fullscreen-active {
         overflow: hidden !important;
         overscroll-behavior: none;
      }

      .custom-fullscreen-element {
         position: fixed !important;
         inset: 0 !important;
         width: 100vw !important;
         height: 100dvh !important;
         /* using dvh to solve mobile browser UI bar issues */
         max-width: none !important;
         max-height: none !important;
         z-index: 99999999 !important;
         border-radius: 0 !important;
         background: #000 !important;
         margin: 0 !important;
         padding: 0 !important;
         transform: none !important;
      }

      #context-menu {
         display: none;
         position: fixed;
         z-index: 99999999;
      }
   </style>
</head>

      const SafeStorage = {

            try {
               const item = localStorage.getItem(key);
               return item ? JSON.parse(item) : fallback;
            } catch (e) {
               localStorage.removeItem(key);
               return fallback;
            }
         },
         set(key, val) {
            try {
               localStorage.setItem(key, JSON.stringify(val));
            } catch (e) {
               console.error("Storage Error", e);
            }
         },
         export () {
            const data = {
               lib: AppState.library,
               set: AppState.settings,
               stats: AppState.stats,
               prof: AppState.profiles,
            };
            const blob = new Blob([JSON.stringify(data)], {
               type: "application/json",
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "BingeBox_Omega_Backup.json";
            a.click();
         },
         import(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
               try {
                  const data = JSON.parse(e.target.result);
                  if (data.lib) SafeStorage.set("bb_lib", data.lib);
                  if (data.set) SafeStorage.set("bb_settings", data.set);
                  if (data.stats) SafeStorage.set("bb_stats", data.stats);

      const TMDB = {
         async fetch(path, params = {}) {
            const query = new URLSearchParams({
               api_key: CONFIG.TMDB_KEY,
               ...params,
            }).toString();
            const url = `${CONFIG.TMDB_BASE}${path}?${query}`;
            if (AppState.cache.has(url)) return AppState.cache.get(url);
            try {
               const res = await fetch(url);
               if (!res.ok) throw new Error("API Error");
               const data = await res.json();
               AppState.cache.set(url, data);
               return data;
            } catch (e) {
               return null;
            }
         },
         getImage(path, size = "w500", type = "poster") {
            if (path) return `${CONFIG.IMG_BASE}/${size}${path}`;
            const dim = type === "poster" ? "500x750" : "1280x720";
            return `https://via.placeholder.com/${dim}/1a1a1a/ffffff?text=Image+Unavailable`;
         },
      };
      const Features = {
         konamiCode: ["ArrowUp", "ArrowUp", "ArrowDown", "ArrowDown", "ArrowLeft", "ArrowRight", "ArrowLeft", "ArrowRight", "b", "a", ],
         kIndex: 0,
         init() {
            this.setupKeybinds();
            this.detectAdBlocker();
            this.detectOffline();
            this.initFPSCounter();
            this.initShakeToShuffle();
            document.documentElement.setAttribute("data-theme", AppState.settings.theme);
         },
         setupKeybinds() {
            document.addEventListener("keydown", (e) => {
               if (e.target.tagName === "INPUT") return;
               if (e.key === this.konamiCode[this.kIndex]) {
                  this.kIndex++;
                  if (this.kIndex === this.konamiCode.length) {
                     UI.toast("GOD MODE UNLOCKED", "success");
                     document.documentElement.setAttribute("data-theme", "godmode");
                     AppState.settings.theme = "godmode";
                     SafeStorage.set("bb_settings", AppState.settings);
                     this.kIndex = 0;
                  }
               } else {
                  this.kIndex = 0;
               }
               if (e.key === "Escape") {
                  Player.close();
                  document.getElementById("modal-container").innerHTML = "";
               }
               if (e.key.toLowerCase() === "f" && Player.isActive) Player.toggleCustomFullscreen();
               if (e.key.toLowerCase() === "s") SearchEngine.open();
            });
         },
         applyTilt(element) {
            element.addEventListener("mousemove", (e) => {
               const rect = element.getBoundingClientRect();
               const x = e.clientX - rect.left;
               const y = e.clientY - rect.top;
               const xPct = x / rect.width - 0.5;
               const yPct = y / rect.height - 0.5;
               element.style.transform = `perspective(1000px) rotateX(${-yPct * 20}deg) rotateY(${xPct * 20}deg) scale3d(1.05, 1.05, 1.05)`;
               element.style.boxShadow = `${-xPct * 20}px ${-yPct * 20}px 30px rgba(var(--color-primary), 0.4)`;
            });
            element.addEventListener("mouseleave", () => {
               element.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
               element.style.boxShadow = `none`;
            });
         },
         startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return UI.toast("Voice API not supported in browser", "error");
            const rec = new SpeechRecognition();
            rec.onstart = () => UI.toast("Listening... Speak now", "info");
            rec.onresult = (e) => {
               const txt = e.results[0][0].transcript;
               if (!document.getElementById("search-input")) SearchEngine.open();
               setTimeout(() => {
                  document.getElementById("search-input").value = txt;
                  SearchEngine.trigger();
               }, 300);
            };
            rec.start();
         },
         detectOffline() {
            window.addEventListener("offline", () => UI.toast("Network Disconnected! Offline Mode.", "error"));
            window.addEventListener("online", () => UI.toast("Network Restored.", "success"));
         },
         detectAdBlocker() {
            fetch("https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js", {
               method: "HEAD",
               mode: "no-cors",
            }).catch(() => {
               console.log("AdBlocker detected. Good. Proceeding.");
            });
         },
         initShakeToShuffle() {
            if (window.DeviceMotionEvent) {
               let lastX = 0,
                  lastY = 0,
                  lastZ = 0,
                  lastTime = 0;
               window.addEventListener("devicemotion", (e) => {
                  const {
                     x,
                     y,
                     z
                  } = e.accelerationIncludingGravity || {};
                  if (!x) return;
                  const currTime = Date.now();
                  if (currTime - lastTime > 100) {
                     const diffTime = currTime - lastTime;
                     const speed = (Math.abs(x + y + z - lastX - lastY - lastZ) / diffTime) * 10000;
                     if (speed > 1500) {
                        UI.toast("Shake detected! Finding random content...", "info");
                        TMDB.fetch("/movie/popular", {
                           page: Math.floor(Math.random() * 50) + 1,
                        }).then((res) => {
                           if (res && res.results.length) Router.navigate("details", {
                              id: res.results[0].id,
                              type: "movie",
                           });
                        });
                     }
                     lastX = x;
                     lastY = y;
                     lastZ = z;
                     lastTime = currTime;
                  }
               });
            }
         },
         initFPSCounter() {
            if (!AppState.settings.showFPS) return;
            const div = document.createElement("div");
            div.className = "fixed bottom-2 left-2 z-[999999] bg-black/80 text-green-400 text-xs font-mono px-2 py-1 rounded border border-white/10";
            document.body.appendChild(div);
            let last = performance.now(),
               frames = 0;
            const loop = () => {
               const now = performance.now();
               frames++;
               if (now - last >= 1000) {
                  div.innerText = `FPS: ${frames}`;
                  frames = 0;
                  last = now;
               }
               requestAnimationFrame(loop);
            };
            loop();
         },
         vibrate(level = "light") {
            if (!navigator.vibrate) return;
            const i = AppState.settings.hapticIntensity / 100;
            if (level === "light") navigator.vibrate(20 * i);
            if (level === "heavy") navigator.vibrate([40 * i, 20, 40 * i]);
         },
      };

                                            <button onclick="Settings.tempTheme('hulu')" class="flex-1 py-3 rounded-lg border border-green-500 bg-green-500/10 text-green-500 font-bold hover:bg-green-500/20">Hulu</button>

                                            <button onclick="Settings.tempTheme('max')" class="flex-1 py-3 rounded-lg border border-purple-500 bg-purple-500/10 text-purple-500 font-bold hover:bg-purple-500/20">Max</button>

                                            <button onclick="Settings.tempTheme('prime')" class="flex-1 py-3 rounded-lg border border-blue-500 bg-blue-500/10 text-blue-500 font-bold hover:bg-blue-500/20">Prime</button>

                                        </div>

                                    </div>

                                    <label class="flex items-center justify-between glass p-4 rounded-xl cursor-pointer">

                                        <span class="font-bold text-sm">Privacy Mode (Incognito)</span>

                                        <input type="checkbox" id="set-privacy" ${s.privacyMode ? "checked" : ""} class="w-5 h-5 accent-theme-primary cursor-pointer" />

                                    </label>

                                    <div>

                                        <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Haptic Feedback Intensity</label>

                                        <input type="range" id="set-haptic" min="0" max="100" value="${s.hapticIntensity}" class="w-full accent-theme-primary" />

                                    </div>

                                </div>

                                <div id="tab-player" class="set-tab space-y-4 ${defaultTab === "player" ? "block" : "hidden"} animate-fade-in">

                                    <h3 class="text-xl font-bold mb-4">Playback & Video</h3>

                                    <label class="flex items-center justify-between glass p-4 rounded-xl cursor-pointer"><span class="font-bold text-sm">Auto-Play Next Episode</span><input type="checkbox" id="set-auto" ${s.autoNext ? "checked" : ""} class="w-5 h-5 accent-theme-primary" /></label>

                                    <label class="flex items-center justify-between glass p-4 rounded-xl cursor-pointer"><span class="font-bold text-sm">Player Ambient Glow Effect</span><input type="checkbox" id="set-glow" ${s.ambientGlow ? "checked" : ""} class="w-5 h-5 accent-theme-primary" /></label>

                                    <label class="flex items-center justify-between glass p-4 rounded-xl cursor-pointer"><span class="font-bold text-sm">Cinema Auto-Dimming</span><input type="checkbox" id="set-dim" ${s.cinemaDim ? "checked" : ""} class="w-5 h-5 accent-theme-primary" /></label>

                                    <div>

                                        <label class="block text-xs font-bold text-gray-400 mb-2 uppercase mt-4">Sleep Timer (Minutes)</label>

                                        <input type="number" id="set-sleep" value="${s.sleepTimer}" min="0" max="180" class="w-full bg-black/50 border border-theme-border rounded-xl px-4 py-3 text-white outline-none focus:border-theme-primary" />

                                    </div>

                                </div>

                                <div id="tab-network" class="set-tab space-y-6 ${defaultTab === "network" ? "block" : "hidden"} animate-fade-in">

                                    <h3 class="text-xl font-bold mb-4">Hydra Swarm Configuration</h3>

                                    <div>

                                        <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Primary Streaming Node</label>

                                        <select id="set-server" class="w-full bg-black/50 border border-theme-border rounded-xl px-4 py-3 text-white focus:border-theme-primary outline-none">

                                            ${AppState.servers.map((srv) => `<option value="${srv.id}" ${s.defaultServer === srv.id ? "selected" : ""}>${srv.name}</option>`).join("")}

                                        </select>

                                    </div>

                                    <label class="flex items-center justify-between glass p-4 rounded-xl cursor-pointer"><span class="font-bold text-sm">Bandwidth Saver Mode</span><input type="checkbox" id="set-bw" ${s.bandwidthSaver ? "checked" : ""} class="w-5 h-5 accent-theme-primary" /></label>

                                    <label class="flex items-center justify-between glass p-4 rounded-xl cursor-pointer"><span class="font-bold text-sm">Show Developer FPS Overlay</span><input type="checkbox" id="set-fps" ${s.showFPS ? "checked" : ""} class="w-5 h-5 accent-theme-primary" /></label>

                                </div>

                                <div id="tab-data" class="set-tab space-y-6 ${defaultTab === "data" ? "block" : "hidden"} animate-fade-in">

                                    <div class="flex justify-between items-center mb-4">

                                        <h3 class="text-xl font-bold">Profile Statistics</h3>

                                        <div class="text-xs text-theme-primary font-bold">CHART.JS RENDERER ACTIVE</div>

                                    </div>

                                    <div class="grid grid-cols-3 gap-4 mb-4">

                                        <div class="glass p-4 rounded-xl text-center"><p class="text-xs text-gray-400">Hours</p><p class="text-2xl font-black text-theme-primary">${AppState.stats.hoursWatched.toFixed(1)}</p></div>

                                        <div class="glass p-4 rounded-xl text-center"><p class="text-xs text-gray-400">Movies</p><p class="text-2xl font-black text-white">${AppState.stats.movies}</p></div>

                                        <div class="glass p-4 rounded-xl text-center"><p class="text-xs text-gray-400">Episodes</p><p class="text-2xl font-black text-white">${AppState.stats.episodes}</p></div>

                                    </div>

                                    <div class="w-full h-32 bg-black/50 rounded-xl p-2 mb-4">

                                        <canvas id="statsChart"></canvas>

                                    </div>

                                    <div class="flex gap-4">

                                        <button onclick="SafeStorage.export()" class="flex-1 bg-blue-600/20 text-blue-400 border border-blue-600/30 py-3 rounded-lg font-bold hover:bg-blue-600/40 transition-colors">Backup Data</button>

                                        <label class="flex-1 bg-green-600/20 text-green-400 border border-green-600/30 py-3 rounded-lg font-bold hover:bg-green-600/40 transition-colors text-center cursor-pointer leading-tight pt-3">

                                            Restore Backup

                                            <input type="file" class="hidden" accept=".json" onchange="SafeStorage.import(this.files[0])" />

                                        </label>

                                    </div>

                                </div>

                                <div class="absolute bottom-0 left-0 w-full pt-4 bg-gradient-to-t from-[var(--color-surface)] to-transparent">

                                    <button onclick="Settings.save()" class="w-full bg-theme-primary text-white font-black text-lg py-4 rounded-xl hover:bg-theme-hover transition-all shadow-[0_0_20px_rgba(var(--color-primary),0.5)]">

                                        APPLY OMEGA SETTINGS

                                    </button>

                                </div>

                            </div>

                        </div>

                    </div>

                `;
            lucide.createIcons();
            setTimeout(() => {
               const ctx = document.getElementById("statsChart");
               if (ctx) {
                  new Chart(ctx, {
                     type: "bar",
                     data: {
                        labels: ["Movies Watched", "Episodes Watched", "Vault Saved"],
                        datasets: [{
                           label: "Profile Activity",
                           data: [
                              AppState.stats.movies,
                              AppState.stats.episodes,
                              AppState.library.watchlater.length + AppState.library.liked.length,
                           ],
                           backgroundColor: ["rgba(229, 9, 20, 0.6)", "rgba(59, 130, 246, 0.6)", "rgba(34, 197, 94, 0.6)"],
                           borderColor: ["#E50914", "#3b82f6", "#22c55e"],
                           borderWidth: 1,
                           borderRadius: 4,
                        }, ],
                     },
                     options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                           y: {
                              beginAtZero: true,
                              grid: {
                                 color: "rgba(255,255,255,0.05)",
                              },
                              ticks: {
                                 color: "#888",
                              },
                           },
                           x: {
                              grid: {
                                 display: false,
                              },
                              ticks: {
                                 color: "#888",
                              },
                           },
                        },
                        plugins: {
                           legend: {
                              display: false,
                           },
                        },
                     },
                  });
               }
            }, 50);
         },
         switchTab(tabId) {
            document.querySelectorAll(".set-tab").forEach((el) => el.classList.add("hidden"));
            document.querySelectorAll(".set-tab-btn").forEach((el) => {
               el.classList.remove("bg-white/10", "text-white");
               el.classList.add("text-gray-500");
            });
            document.getElementById(`tab-${tabId}`).classList.remove("hidden");
            document.querySelector(`.set-tab-btn[data-tab="${tabId}"]`).classList.add("bg-white/10", "text-white");
         },
         tempTheme(t) {
            document.documentElement.setAttribute("data-theme", t);
            AppState.settings.theme = t;
         },
         save() {
            const s = AppState.settings;
            s.defaultServer = document.getElementById("set-server")?.value || s.defaultServer;
            s.ambientGlow = document.getElementById("set-glow")?.checked ?? s.ambientGlow;
            s.cinemaDim = document.getElementById("set-dim")?.checked ?? s.cinemaDim;
            s.privacyMode = document.getElementById("set-privacy")?.checked ?? s.privacyMode;
            s.bandwidthSaver = document.getElementById("set-bw")?.checked ?? s.bandwidthSaver;
            s.showFPS = document.getElementById("set-fps")?.checked ?? s.showFPS;
            s.autoNext = document.getElementById("set-auto")?.checked ?? s.autoNext;
            s.sleepTimer = parseInt(document.getElementById("set-sleep")?.value || 0);
            s.hapticIntensity = parseInt(document.getElementById("set-haptic")?.value || 50);
            SafeStorage.set("bb_settings", s);
            this.close();
            UI.toast("Omega configuration locked and active.", "success");
            if (s.showFPS && !document.querySelector(".fixed.bottom-2")) Features.initFPSCounter();
         },
         close() {
            document.documentElement.setAttribute("data-theme", AppState.settings.theme);
            document.getElementById("modal-container").innerHTML = "";
         },
      };
      document.addEventListener("DOMContentLoaded", () => UI.init());
   </script>
</body>

  </html>
