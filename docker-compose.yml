version: '3.8'\n\nservices:\n  app:\n    image: node:16\n    container_name: node_app\n    ports:\n      - "3000:3000"  # Map host port 3000 to container port 3000\n    volumes:\n      - ./media:/app/media  # Volume mount for media\n      - ./logs:/app/logs    # Volume mount for logs\n    environment:\n      NODE_ENV: production\n      REDIS_HOST: redis\n      REDIS_PORT: 6379\n    restart: unless-stopped\n    healthcheck:\n      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]\n      interval: 1m30s\n      timeout: 10s\n      retries: 3\n\n  redis:\n    image: redis:alpine\n    container_name: redis_server\n    ports:\n      - "6379:6379"  # Map host port 6379 to container port 6379\n    restart: unless-stopped\n    healthcheck:\n      test: ["CMD", "redis-cli", "ping"]\n      interval: 1m\n      timeout: 10s\n      retries: 5\n